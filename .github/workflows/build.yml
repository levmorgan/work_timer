name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            script: ./build_mac.sh
            artifact: work_timer.app
          - os: ubuntu-latest
            script: ./build_linux.sh
            artifact: work_timer
          - os: windows-latest
            script: build_windows.bat
            artifact: work_timer.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: create venv and install dependencies
        run: |
          python -m venv .venv
          .venv/Scripts/pip install -r requirements-dev.txt || .venv/bin/pip install -r requirements-dev.txt

      - name: run tests
        run: .venv/Scripts/pytest tests/ -q || .venv/bin/pytest tests/ -q

      - name: build ${{ matrix.artifact }}
        run: ${{ matrix.script }}

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
