name: build

on:
  push:
    tags: ["*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            script: ./build_mac.sh
            artifact: work_timer-macos
            pip_path: .venv/bin/pip
          - os: ubuntu-latest
            script: ./build_linux.sh
            artifact: work_timer-linux
            pip_path: .venv/bin/pip
          - os: windows-latest
            script: .\build_windows.bat
            artifact: work_timer-windows
            pip_path: .venv/Scripts/pip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: create venv
        run: python -m venv .venv

      - name: install dependencies
        run: ${{ matrix.pip_path }} install -r requirements-dev.txt

      - name: build ${{ matrix.artifact }}
        run: ${{ matrix.script }}

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/
