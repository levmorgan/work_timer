name: build

on:
  push:
    tags: ["*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            script: ./build_mac.sh
            artifact: work_timer-macos
            pip_path: .venv/bin/pip
          - os: ubuntu-latest
            script: ./build_linux.sh
            artifact: work_timer-linux
            pip_path: .venv/bin/pip
          - os: windows-latest
            script: .\build_windows.bat
            artifact: work_timer-windows
            pip_path: .venv/Scripts/pip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: create venv
        run: python -m venv .venv

      - name: install dependencies
        run: ${{ matrix.pip_path }} install -r requirements-dev.txt

      - name: build ${{ matrix.artifact }}
        run: ${{ matrix.script }}

      - name: package (macOS)
        if: runner.os == 'macOS'
        run: cd dist && zip -r ../work_timer-macos.zip work_timer.app

      - name: package (Linux)
        if: runner.os == 'Linux'
        run: cd dist && tar czf ../work_timer-linux.tar.gz work_timer

      - name: package (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\work_timer\* -DestinationPath work_timer-windows.zip

      - name: upload to release (macOS)
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: work_timer-macos.zip

      - name: upload to release (Linux)
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: work_timer-linux.tar.gz

      - name: upload to release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: work_timer-windows.zip
